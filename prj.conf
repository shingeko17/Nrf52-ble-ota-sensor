# ========================================
# nRF52840 BLE OTA Sensor - Kconfig
# ========================================

# --- General ---
CONFIG_HEAP_MEM_POOL_SIZE=4096
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# --- Logging ---
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_DEFAULT_LEVEL=3

# --- GPIO ---
CONFIG_GPIO=y

# --- Sensor (onboard temp) ---
CONFIG_SENSOR=y
CONFIG_TEMP_NRF5=y

# --- Bluetooth ---
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="nRF52_OTA_Sensor"
CONFIG_BT_DEVICE_APPEARANCE=768
CONFIG_BT_MAX_CONN=1
CONFIG_BT_MAX_PAIRED=1

# BLE Security (optional, can enable later)
# CONFIG_BT_SMP=y
# CONFIG_BT_KEYS_OVERWRITE_OLDEST=y

# --- MCUboot (Secure Bootloader) ---
CONFIG_BOOTLOADER_MCUBOOT=y

# --- SMP / mcumgr (OTA Update) ---
CONFIG_NET_BUF=y
CONFIG_ZCBOR=y
CONFIG_MCUMGR=y
CONFIG_MCUMGR_GRP_IMG=y
CONFIG_MCUMGR_GRP_OS=y
CONFIG_MCUMGR_TRANSPORT_BT=y
CONFIG_MCUMGR_TRANSPORT_BT_AUTHEN=n

# Flash backend for mcumgr image upload
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_IMG_MANAGER=y
CONFIG_STREAM_FLASH=y

# --- Assert (debug builds) ---
CONFIG_ASSERT=y
CONFIG_ASSERT_LEVEL=2
